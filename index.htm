<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>音频序列播放器 - 贫困Command版 | 支持追加文件</title>
    <!-- 无CSS，纯粹命令行风格 -->
</head>
<body>
    <h1>🎧 贫困Command版 · 音频序列播放器</h1>
    <p><strong>哲学：</strong>你的声音，你的命令。不要鼠标，不留情面。</p>
    <p>上传音频文件（可追加，同名覆盖）。然后输入序列，格式如 <code>a:0,i:2,u:-1</code>。没有冒号则默认音高+1。</p>
    <hr>

    <!-- 文件上传区：支持多选，且追加到列表 -->
    <div>
        <label for="audioFiles">📂 选择音频文件（可追加，不会清空已有）：</label>
        <input type="file" id="audioFiles" accept="audio/*" multiple>
        <button id="clearFilesBtn" style="margin-left: 10px;">🗑 清空所有文件</button>
    </div>
    <br>

    <!-- 已加载文件列表（命令行风格） -->
    <div>
        <strong>📋 当前已加载文件列表（文件名不区分大小写，不含后缀）：</strong>
        <div id="fileListDisplay" style="border:1px solid #ccc; padding: 8px; min-height: 60px; max-height: 150px; overflow-y: auto; font-family: monospace; background: #f9f9f9;">
            暂无文件
        </div>
    </div>
    <br>

    <!-- 序列输入框 -->
    <div>
        <label for="sequenceInput">🎼 播放序列（命令行风格）：</label><br>
        <textarea id="sequenceInput" rows="3" cols="70" placeholder="例如: a:0, i_long:2, breath:0, a_short:-1&#10;或者简写: a,b,c  (默认音高1)"></textarea>
        <br><small>提示：文件名不需要后缀。支持负音高。依次播放，支持多次调用同一文件。</small>
    </div>
    <br>

    <!-- 控制按钮 -->
    <button id="playBtn">▶ 播放序列</button>
    <button id="stopBtn">⏹ 停止播放</button>

    <!-- 状态与日志 -->
    <div id="status" style="margin-top: 20px; border: 1px solid #ccc; padding: 8px; min-height: 120px; font-family: monospace; overflow-y: auto; max-height: 250px; background: #fefefe;">
        等待操作...<br>
        💡 提示：可多次上传追加文件，同名文件会覆盖。预处理好的“a_short.wav”“a_long.wav”等可以一起工作。
    </div>

    <script>
        // ---------- 全局变量 ----------
        let audioContext = null;
        let currentSource = null;
        let currentTimeout = null;
        let isPlaying = false;
        let playQueue = [];
        let currentIndex = 0;

        // 存储文件映射：key为小写文件名(无后缀) -> { blobUrl, bufferPromise, buffer, originalName }
        let fileMap = new Map();

        // ---------- UI 辅助函数 ----------
        function logMessage(msg, isError = false) {
            const statusDiv = document.getElementById('status');
            const p = document.createElement('div');
            p.textContent = msg;
            p.style.color = isError ? '#c00' : '#000';
            p.style.fontFamily = 'monospace';
            statusDiv.appendChild(p);
            statusDiv.scrollTop = statusDiv.scrollHeight;
            console.log(msg);
        }

        // 刷新文件列表显示区域
        function updateFileListDisplay() {
            const container = document.getElementById('fileListDisplay');
            if (fileMap.size === 0) {
                container.innerHTML = '<span style="color: #888;">(暂无文件，请上传音频)</span>';
                return;
            }
            let html = '';
            for (let [key, info] of fileMap.entries()) {
                const originalFileName = info.originalFile ? info.originalFile.name : key;
                html += `<div>🎵 ${key}  ← 原始文件: ${originalFileName}</div>`;
            }
            container.innerHTML = html;
        }

        // 释放所有 Blob URL 并清空 Map
        function clearAllFiles() {
            for (let [key, info] of fileMap.entries()) {
                if (info.blobUrl) {
                    URL.revokeObjectURL(info.blobUrl);
                }
            }
            fileMap.clear();
            updateFileListDisplay();
            logMessage("🗑 已清空所有音频文件");
        }

        // 处理文件上传：追加模式，同名则覆盖（先释放旧URL）
        function handleFilesUpload(files) {
            if (!files || files.length === 0) return;

            let addedCount = 0;
            let replacedCount = 0;

            for (let file of files) {
                // 获取不带扩展名的文件名
                let fullName = file.name;
                let dotIndex = fullName.lastIndexOf('.');
                let baseName = dotIndex !== -1 ? fullName.substring(0, dotIndex) : fullName;
                let key = baseName.toLowerCase();

                // 如果已存在同名，先释放旧资源并提示覆盖
                if (fileMap.has(key)) {
                    const oldInfo = fileMap.get(key);
                    if (oldInfo.blobUrl) URL.revokeObjectURL(oldInfo.blobUrl);
                    replacedCount++;
                    logMessage(`🔄 覆盖文件: ${baseName} (之前已存在)`);
                } else {
                    addedCount++;
                }

                // 创建新的 blob URL
                const blobUrl = URL.createObjectURL(file);
                fileMap.set(key, {
                    blobUrl: blobUrl,
                    originalFile: file,
                    buffer: null,
                    bufferPromise: null
                });
                logMessage(`✅ ${addedCount > 0 && replacedCount === 0 ? '新增' : ''} 已加载: ${baseName} (${file.type || 'audio'})`);
            }

            updateFileListDisplay();
            if (addedCount > 0) logMessage(`✨ 本次新增 ${addedCount} 个文件，覆盖 ${replacedCount} 个文件。当前共 ${fileMap.size} 个音频。`);
            else if (replacedCount > 0) logMessage(`🔄 本次覆盖 ${replacedCount} 个文件，当前共 ${fileMap.size} 个音频。`);
        }

        // ---------- 音频核心逻辑 (与之前类似，但添加停止等) ----------
        function ensureAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }

        function stopCurrentPlayback() {
            if (currentTimeout) {
                clearTimeout(currentTimeout);
                currentTimeout = null;
            }
            if (currentSource) {
                try {
                    currentSource.stop();
                } catch(e) {}
                currentSource.disconnect();
                currentSource = null;
            }
            isPlaying = false;
            playQueue = [];
            currentIndex = 0;
        }

        function stopSequence() {
            if (audioContext && currentSource) {
                try {
                    currentSource.stop();
                } catch(e) {}
                currentSource.disconnect();
                currentSource = null;
            }
            if (currentTimeout) clearTimeout(currentTimeout);
            isPlaying = false;
            playQueue = [];
            currentIndex = 0;
            logMessage("⏹ 播放已停止");
        }

        // 根据 fileKey 获取 AudioBuffer (带缓存)
        function getAudioBuffer(fileKey) {
            const fileInfo = fileMap.get(fileKey);
            if (!fileInfo) {
                return Promise.reject(new Error(`未找到文件: ${fileKey}`));
            }
            if (fileInfo.bufferPromise) {
                return fileInfo.bufferPromise;
            }
            const ctx = ensureAudioContext();
            const blobUrl = fileInfo.blobUrl;
            const promise = fetch(blobUrl)
                .then(response => response.arrayBuffer())
                .then(arrayBuffer => ctx.decodeAudioData(arrayBuffer))
                .then(audioBuffer => {
                    fileInfo.buffer = audioBuffer;
                    return audioBuffer;
                })
                .catch(err => {
                    logMessage(`❌ 解码失败 (${fileKey}): ${err.message}`, true);
                    throw err;
                });
            fileInfo.bufferPromise = promise;
            return promise;
        }

        // 播放单个音频 (playOne)
        function playOne(buffer, pitch, fileIdentifier) {
            return new Promise((resolve, reject) => {
                if (!audioContext || audioContext.state === 'closed') {
                    reject(new Error('音频上下文不可用'));
                    return;
                }
                const doPlay = () => {
                    if (!isPlaying) {
                        reject(new Error('播放已被用户停止'));
                        return;
                    }
                    const source = audioContext.createBufferSource();
                    source.buffer = buffer;
                    const playbackRate = Math.pow(2, pitch / 12);
                    source.playbackRate.value = playbackRate;
                    source.connect(audioContext.destination);
                    currentSource = source;
                    source.onended = () => {
                        if (currentSource === source) currentSource = null;
                        resolve();
                    };
                    source.start();
                    const pitchStr = pitch >= 0 ? `+${pitch}` : `${pitch}`;
                    logMessage(`🎵 播放: ${fileIdentifier} (音高 ${pitchStr} 半音, 速率=${playbackRate.toFixed(4)})`);
                };

                if (audioContext.state !== 'running') {
                    audioContext.resume().then(doPlay).catch(reject);
                } else {
                    doPlay();
                }
            });
        }

        // 解析序列文本 (同前)
        function parseSequence(sequenceText) {
            const items = [];
            if (!sequenceText.trim()) return items;
            const parts = sequenceText.split(',');
            for (let part of parts) {
                part = part.trim();
                if (part === "") continue;
                let fileKey = "";
                let pitch = 1;
                if (part.includes(':')) {
                    const idx = part.indexOf(':');
                    fileKey = part.substring(0, idx).trim();
                    const pitchPart = part.substring(idx + 1).trim();
                    if (pitchPart !== "") {
                        const parsed = parseInt(pitchPart, 10);
                        if (!isNaN(parsed)) pitch = parsed;
                        else logMessage(`警告: 音高 "${pitchPart}" 非整数，用默认1`, true);
                    }
                } else {
                    fileKey = part;
                    pitch = 1;
                }
                if (fileKey === "") {
                    logMessage(`警告: 无效条目 "${part}"`, true);
                    continue;
                }
                // 自动去掉可能误带的扩展名
                let normalizedKey = fileKey;
                if (normalizedKey.includes('.')) {
                    normalizedKey = normalizedKey.substring(0, normalizedKey.lastIndexOf('.'));
                    logMessage(`注意: "${fileKey}" 已去掉后缀 -> "${normalizedKey}"`);
                }
                items.push({ fileKey: normalizedKey.toLowerCase(), pitch: pitch, originalRaw: fileKey });
            }
            return items;
        }

        // 主播放流程
        async function startPlaySequence() {
            stopCurrentPlayback();
            if (fileMap.size === 0) {
                logMessage("❌ 还没有任何音频文件，请先上传（可追加多个）", true);
                return;
            }
            const sequenceText = document.getElementById('sequenceInput').value;
            if (!sequenceText.trim()) {
                logMessage("❌ 播放序列不能为空", true);
                return;
            }
            const parsedItems = parseSequence(sequenceText);
            if (parsedItems.length === 0) {
                logMessage("❌ 序列无有效条目", true);
                return;
            }

            // 过滤出存在的文件
            const playTasks = [];
            for (let item of parsedItems) {
                if (!fileMap.has(item.fileKey)) {
                    logMessage(`⚠️ 跳过缺失文件: "${item.originalRaw}" (匹配key: ${item.fileKey})`, true);
                    continue;
                }
                playTasks.push({ fileKey: item.fileKey, pitch: item.pitch, originalRaw: item.originalRaw });
            }
            if (playTasks.length === 0) {
                logMessage("❌ 没有有效的可播放条目", true);
                return;
            }

            // 初始化并激活 AudioContext
            const ctx = ensureAudioContext();
            try {
                if (ctx.state === 'suspended') await ctx.resume();
                else if (ctx.state === 'closed') {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    await audioContext.resume();
                }
            } catch(e) {
                logMessage(`❌ 音频启动失败: ${e.message}`, true);
                return;
            }

            isPlaying = true;
            currentIndex = 0;
            logMessage(`▶ 开始播放序列，共 ${playTasks.length} 个片段`);

            for (let i = 0; i < playTasks.length; i++) {
                if (!isPlaying) break;
                currentIndex = i;
                const task = playTasks[i];
                try {
                    const buffer = await getAudioBuffer(task.fileKey);
                    if (!isPlaying) break;
                    await playOne(buffer, task.pitch, `${task.originalRaw} (pitch=${task.pitch})`);
                } catch (err) {
                    if (!isPlaying) break;
                    logMessage(`❌ 播放失败 (${task.originalRaw}): ${err.message}`, true);
                    // 继续下一个
                }
            }
            if (isPlaying) {
                logMessage("✅ 播放完毕");
                isPlaying = false;
                currentSource = null;
            }
        }

        // ---------- 事件绑定 ----------
        document.getElementById('audioFiles').addEventListener('change', (e) => {
            handleFilesUpload(e.target.files);
            // 清空 input value，以便再次选择同一个文件也能触发 change (但追加模式无需清空也可)
            // 为了让用户再次添加同一文件（如修改后重新上传），清空一下比较符合直觉
            e.target.value = '';
        });
        document.getElementById('clearFilesBtn').addEventListener('click', () => {
            clearAllFiles();
        });
        document.getElementById('playBtn').addEventListener('click', () => {
            if (isPlaying) {
                stopSequence();
                setTimeout(() => startPlaySequence(), 50);
            } else {
                startPlaySequence();
            }
        });
        document.getElementById('stopBtn').addEventListener('click', () => {
            stopSequence();
        });

        window.addEventListener('beforeunload', () => {
            for (let [key, info] of fileMap.entries()) {
                if (info.blobUrl) URL.revokeObjectURL(info.blobUrl);
            }
            if (audioContext) audioContext.close();
        });

        updateFileListDisplay();
        logMessage("✅ 就绪。支持追加文件，同名自动覆盖。命令行风格序列，开始创作吧！");
    </script>
</body>
</html>
