<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>音频静音切除器 - 自动跳过静音/小声部分</title>
</head>
<body>
    <h2>🎵 音频静音切除器</h2>
    <p>上传 MP3 文件，自动删除音量过小的部分（静音/小声区域），并生成处理后的音频下载链接。</p>
    
    <input type="file" id="fileInput" accept="audio/mpeg,audio/mp3">
    <button id="processBtn">处理音频（切除静音）</button>
    <div id="status" style="margin: 10px 0; color: #555;"></div>
    <div id="downloadArea" style="margin: 15px 0;"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const statusDiv = document.getElementById('status');
        const downloadArea = document.getElementById('downloadArea');

        // 配置参数
        const VOLUME_THRESHOLD = 0.015;       // 音量阈值 (0~1)，小于此值视为静音/小声
        const MIN_SOUND_DURATION = 0.08;      // 最小有声片段时长(秒)，短于这个就不单独保留（避免爆音碎片）

        // 将AudioBuffer转换为WAV并下载
        function downloadAudioBuffer(buffer, originalFileName) {
            const length = buffer.length;
            const sampleRate = buffer.sampleRate;
            const numberOfChannels = buffer.numberOfChannels;
            
            // 创建WAV文件
            const wavData = audioBufferToWav(buffer);
            const blob = new Blob([wavData], { type: 'audio/wav' });
            
            // 生成下载链接
            const url = URL.createObjectURL(blob);
            const downloadLink = document.createElement('a');
            const name = originalFileName.replace(/\.mp3$/i, '') + '_no_silence.wav';
            downloadLink.href = url;
            downloadLink.download = name;
            downloadLink.textContent = `📥 下载处理后的音频 (WAV格式) - ${name}`;
            downloadLink.style.display = 'block';
            downloadLink.style.margin = '10px 0';
            
            downloadArea.innerHTML = '';
            downloadArea.appendChild(downloadLink);
            
            // 可选：播放预览
            const audioPreview = document.createElement('audio');
            audioPreview.controls = true;
            audioPreview.src = url;
            audioPreview.style.marginTop = '10px';
            downloadArea.appendChild(audioPreview);
        }

        // AudioBuffer 转 WAV (16-bit PCM)
        function audioBufferToWav(buffer) {
            const numberOfChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            
            let samples = buffer.getChannelData(0);
            // 如果是多声道，简单混合到单声道（或保留第一个声道，此处混合）
            if (numberOfChannels > 1) {
                for (let i = 1; i < numberOfChannels; i++) {
                    const channelData = buffer.getChannelData(i);
                    for (let j = 0; j < samples.length; j++) {
                        samples[j] = (samples[j] + channelData[j]) / 2;
                    }
                }
            }
            
            const dataLength = samples.length * 2; // 16-bit = 2字节
            const bufferLength = 44 + dataLength;
            const arrayBuffer = new ArrayBuffer(bufferLength);
            const view = new DataView(arrayBuffer);
            
            // RIFF chunk
            writeString(view, 0, 'RIFF');
            view.setUint32(4, bufferLength - 8, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); // chunk size
            view.setUint16(20, format, true);
            view.setUint16(22, 1, true); // 单声道（混合后）
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); // byte rate
            view.setUint16(32, 2, true); // block align
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);
            
            // 写入采样数据
            let offset = 44;
            for (let i = 0; i < samples.length; i++) {
                let sample = Math.max(-1, Math.min(1, samples[i]));
                let intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(offset, intSample, true);
                offset += 2;
            }
            
            return arrayBuffer;
        }
        
        function writeString(view, offset, str) {
            for (let i = 0; i < str.length; i++) {
                view.setUint8(offset + i, str.charCodeAt(i));
            }
        }

        // 核心处理：提取非静音片段，组成新AudioBuffer
        async function removeSilenceFromAudio(audioBuffer) {
            const channelData = audioBuffer.getChannelData(0); // 取第一声道分析
            const sampleRate = audioBuffer.sampleRate;
            const duration = audioBuffer.duration;
            const totalSamples = channelData.length;
            
            // 1. 标记每个采样点是否为“有声”
            const isSound = new Array(totalSamples);
            for (let i = 0; i < totalSamples; i++) {
                isSound[i] = Math.abs(channelData[i]) >= VOLUME_THRESHOLD;
            }
            
            // 2. 找出连续有声的区间 (起始索引，结束索引)
            const soundSegments = [];
            let inSound = false;
            let startIdx = 0;
            
            for (let i = 0; i < totalSamples; i++) {
                if (!inSound && isSound[i]) {
                    // 进入有声区域
                    inSound = true;
                    startIdx = i;
                } else if (inSound && !isSound[i]) {
                    // 离开有声区域
                    inSound = false;
                    const segDuration = (i - startIdx) / sampleRate;
                    if (segDuration >= MIN_SOUND_DURATION) {
                        soundSegments.push({ start: startIdx, end: i });
                    }
                }
            }
            // 如果末尾还在有声
            if (inSound) {
                const segDuration = (totalSamples - startIdx) / sampleRate;
                if (segDuration >= MIN_SOUND_DURATION) {
                    soundSegments.push({ start: startIdx, end: totalSamples });
                }
            }
            
            if (soundSegments.length === 0) {
                throw new Error('未检测到有效音频片段（可能阈值太高或文件全静音）');
            }
            
            // 3. 计算新总长度，并复制数据
            let newLength = 0;
            for (const seg of soundSegments) {
                newLength += (seg.end - seg.start);
            }
            
            const numberOfChannels = audioBuffer.numberOfChannels;
            const newBuffer = new AudioBuffer({
                numberOfChannels: numberOfChannels,
                length: newLength,
                sampleRate: sampleRate
            });
            
            // 逐声道复制
            for (let ch = 0; ch < numberOfChannels; ch++) {
                const oldData = audioBuffer.getChannelData(ch);
                const newData = newBuffer.getChannelData(ch);
                let writePos = 0;
                for (const seg of soundSegments) {
                    const segLen = seg.end - seg.start;
                    for (let i = 0; i < segLen; i++) {
                        newData[writePos + i] = oldData[seg.start + i];
                    }
                    writePos += segLen;
                }
            }
            
            return newBuffer;
        }

        // 主流程
        processBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) {
                statusDiv.innerText = '❌ 请先选择一个 MP3 文件';
                return;
            }
            
            statusDiv.innerText = '⏳ 正在解码音频...';
            downloadArea.innerHTML = ''; // 清空之前的下载链接
            
            try {
                // 解码 MP3
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                statusDiv.innerText = '✂️ 正在分析并切除静音/小声部分...';
                
                // 处理静音切除
                const processedBuffer = await removeSilenceFromAudio(audioBuffer);
                
                statusDiv.innerText = '✅ 处理完成！生成下载链接中...';
                
                // 提供下载
                downloadAudioBuffer(processedBuffer, file.name);
                
                statusDiv.innerText = '🎉 成功！点击上方链接下载 WAV 文件（已去除静音/小声部分）';
                audioContext.close();
            } catch (err) {
                console.error(err);
                statusDiv.innerText = '⚠️ 处理失败: ' + err.message;
            }
        };
    </script>
</body>
</html>
