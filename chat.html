<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机端：viewport 设置，同时保留电脑端正常缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>六年一班论坛(非官方个人建)</title>
    <style>
        /* ========== 保留全部原有样式（命名/风格） ========== */
        body { 
            position: relative; 
            background-color: black; 
            margin: 0px; 
            display: flex; 
            flex-direction: column; 
        }
        .hd { font-size: 10px; }
        .ab { color: white; padding-left: 10px; }
        .div { 
            margin: 8px; 
            padding: 8px 0px; 
            width: 500px; 
            text-align: center; 
            color: black; 
            border: 1px solid rgba(0, 0, 0, 0.16); 
            border-radius: 10px; 
            background-color: white; 
        }
        .hhh { padding: 4px; }
        .bom { 
            position: absolute; 
            font-weight: bold; 
            top: 0px; 
            right: 0px; 
            float: left; 
            margin: 2px; 
            padding: 2px 0px; 
            line-height: 60px; 
            width: 100px; 
            height: 60px; 
            text-align: center; 
            color: rgb(255, 255, 255); 
            font-size: 17px; 
            border: 1px solid rgba(0, 0, 0, 0.16); 
            border-radius: 10px; 
            cursor: pointer; 
            user-select: none; 
            background-color: #000; 
        }
        .tit { display: flex; justify-content: flex-start; }
        .title1 { 
            width: 94.84%; 
            height: 100px; 
            color: white; 
            display: flex; 
            justify-content: space-between; 
            margin: 0px auto; 
        }
        .boms { display: flex; justify-content: flex-end; font-weight: bold; }
        .form-area { 
            margin: 20px 0 20px 10px; 
            width: 500px; 
            background: white; 
            padding: 15px; 
            border-radius: 10px; 
        }
        .form-area input, .form-area textarea { 
            width: 90%; 
            padding: 8px; 
            margin: 5px 0; 
            border-radius: 5px; 
            border: 1px solid #ccc; 
        }
        .form-area button { 
            background: #4CAF50; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
        }

        /* ========== 新增：手机端适配 (不改变原有命名，只增加响应式规则) ========== */
        /* 针对小屏幕 (手机) 最大宽度 768px，同时不影响电脑显示 */
        @media screen and (max-width: 768px) {
            /* ★★★ 重点：标题栏保持并排，不换行 ★★★ */
            .title1 {
                width: 100%;
                height: auto;
                min-height: 70px;
                padding: 5px 10px;
                flex-wrap: nowrap;        /* 禁止换行，保持一行 */
                align-items: center;
                justify-content: space-between;
                box-sizing: border-box;
            }
            
            .tit {
                justify-content: flex-start;
                flex: 0 1 auto;           /* 不强制拉伸 */
                gap: 5px;
            }
            
            .tit img {
                width: 55px;              /* 手机端适当缩小图片 */
                height: auto;
                max-width: 100%;
            }
            
            /* 返回按钮区域 - 保持靠右 */
            .boms {
                justify-content: flex-end;
                flex: 0 0 auto;           /* 不拉伸，保持内容宽度 */
                margin-left: 10px;
            }
            
            /* 返回首页按钮 - 调整尺寸适应手机 */
            .bom {
                position: static;          /* 取消绝对定位，用flex布局 */
                float: none;
                margin: 0;
                width: auto;
                min-width: 75px;
                height: 40px;
                line-height: 40px;
                font-size: 14px;
                padding: 0 12px;
                white-space: nowrap;
            }

            /* 正文区域文字大小微调 */
            .ab {
                padding-left: 12px;
                padding-right: 8px;
            }
            .ab h1 { font-size: 24px; margin: 10px 0 5px; }
            .ab h2 { font-size: 18px; margin: 5px 0; }
            .ab h3 { font-size: 14px; margin: 5px 0 15px; line-height: 1.4; }

            /* 留言卡片 — 手机端统一宽度并居中 */
            .div {
                width: 92% !important;
                max-width: 92% !important;
                margin: 8px auto !important;
                padding: 10px 4px;
                box-sizing: border-box;
                word-break: break-word;
                display: block;
            }
            
            /* 留言列表容器 */
            #留言列表 {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 0;
            }
            
            .hhh {
                padding: 6px 8px;
                font-size: 15px;
            }

            /* 表单区域 */
            .form-area {
                width: 92% !important;
                max-width: 92% !important;
                margin: 15px auto !important;
                padding: 15px 12px;
                box-sizing: border-box;
            }
            .form-area input, 
            .form-area textarea {
                width: 100% !important;
                max-width: 100%;
                box-sizing: border-box;
                font-size: 16px;
            }
            .form-area button {
                width: 100%;
                padding: 14px 0;
                font-size: 18px;
                font-weight: bold;
                margin-top: 8px;
            }

            body {
                padding-bottom: 20px;
            }

            .hd { font-size: 8px; height: 5px; }
        }

        /* 更小屏 (如iPhone SE) 进一步优化 */
        @media screen and (max-width: 480px) {
            .tit img {
                width: 45px;              /* 更小屏继续缩小图片 */
            }
            
            .bom {
                min-width: 65px;
                height: 36px;
                line-height: 36px;
                font-size: 13px;
                padding: 0 8px;
            }
            
            .ab h1 { font-size: 20px; }
            .ab h2 { font-size: 15px; }
            .hhh { font-size: 14px; }
            
            .div {
                width: 94% !important;
                max-width: 94% !important;
            }
            .form-area {
                width: 94% !important;
                max-width: 94% !important;
            }
        }

        /* 极小屏 (如iPhone SE 1代) */
        @media screen and (max-width: 375px) {
            .tit img {
                width: 40px;
            }
            
            .bom {
                min-width: 60px;
                height: 32px;
                line-height: 32px;
                font-size: 12px;
                padding: 0 6px;
            }
            
            .title1 {
                padding: 5px 8px;
            }
        }

        /* 电脑/大屏下保持原有样式，不做任何破坏 */
        @media screen and (min-width: 769px) {
            .bom {
                position: absolute;
            }
            .title1 {
                /* 原有固定宽度 */
            }
            .div {
                width: 500px;
                margin: 8px;
            }
            .form-area {
                width: 500px;
                margin: 20px 0 20px 10px;
            }
        }

        /* 额外小优化 */
        #ddd, .tit img {
            object-fit: contain;
        }
        
        .bom:hover {
            opacity: 0.85;
        }
        
        /* 确保图片之间有间距 */
        .tit {
            gap: 8px;
        }
    </style>
</head>
<body>
<div class="hd"><br></div>

<div class="title1">
    <div class="tit">
        <img src="class.webp" width="100" alt="class logo">
        <img src="sbschool.webp" width="100" id="ddd" alt="school logo">
    </div>
    <div class="boms">
        <div class="bom" id="b0">
            <text>返回首页</text>
        </div>
    </div>
</div>

<div class="ab">
    <h1>6(1)班 班级论坛</h1>
    <h2>本论坛提倡友好交流</h2>
    <h3>直接在下方留言即可，不用申请！加载要2秒左右，要看早的消息往下滑</h3>
</div>

<!-- 发表留言的表单 (命名与原有完全一致) -->
<div class="form-area">
    <input type="text" id="昵称" placeholder="你的名字或学号" style="width: 90%;">
    <textarea id="内容" placeholder="说点什么..." rows="3" style="width: 90%;"></textarea>
    <button onclick="发留言()">发送留言</button>
</div>

<!-- 留言列表会显示在这里 -->
<div id="留言列表"></div>

<script>
// ⚠️ 改成你的 PythonAnywhere 地址 （保留原有注释）
const API = 'https://liweizhimesly.pythonanywhere.com/api/messages';

async function 加载留言() {
    try {
        const res = await fetch(API);
        const 列表 = await res.json();
        const div = document.getElementById('留言列表');
        if (列表.length === 0) {
            div.innerHTML = '<div class="div"><div class="hhh">暂无留言，抢沙发！</div></div>';
            return;
        }
        div.innerHTML = 列表.map(m => {
            let date = new Date(m.created_at);
            // 补零函数，保持显示整洁
            let month = date.getMonth()+1;
            let day = date.getDate();
            let hours = date.getHours();
            let minutes = date.getMinutes();
            // 格式化为两位数
            let dateStr = `${date.getFullYear()}/${month<10?'0'+month:month}/${day<10?'0'+day:day} ${hours<10?'0'+hours:hours}:${minutes<10?'0'+minutes:minutes}`;
            return `<div class="div"><div class="hhh"><strong>${escapeHtml(m.name)}</strong>：${escapeHtml(m.content)}<br><span style="font-size:12px;color:gray;">${dateStr}</span></div></div>`;
        }).join('');
    } catch(e) {
        console.error('加载失败', e);
        document.getElementById('留言列表').innerHTML = '<div class="div"><div class="hhh">加载留言失败，请稍后再试</div></div>';
    }
}

async function 发留言() {
    const 昵称 = document.getElementById('昵称').value.trim();
    const 内容 = document.getElementById('内容').value.trim();
    if (!昵称 || !内容) {
        alert('请填写昵称和留言内容');
        return;
    }
    
    // 禁用按钮，防止重复提交
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '发送中...';
    
    try {
        const res = await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: 昵称, content: 内容})
        });
        const result = await res.json();
        if (result.error) {
            alert('发送失败：' + result.error);
        } else {
            alert('发送成功！');
            document.getElementById('昵称').value = '';
            document.getElementById('内容').value = '';
            await 加载留言(); // 等待刷新完成
        }
    } catch(e) {
        alert('网络错误，请稍后再试');
        console.error(e);
    } finally {
        // 恢复按钮
        btn.disabled = false;
        btn.textContent = '发送留言';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 页面加载时自动获取留言
setInterval(加载留言,1000);

// 返回首页按钮
document.getElementById('b0').onclick = function() {
    window.location.href = 'index.html';
};

// 初始加载
加载留言();
</script>
</body>
</html>
