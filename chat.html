<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>六年一班论坛(非官方个人建)</title>
    <style>
        body { position: relative; background-color: black; margin: 0px; display: flex; flex-direction: column; }
        .hd { font-size: 10px; }
        .ab { color: white; padding-left: 10px; }
        .div { margin: 8px; padding: 8px 0px; width: 500px; text-align: center; color: black; border: 1px solid rgba(0, 0, 0, 0.16); border-radius: 10px; background-color: white; }
        .hhh { padding: 4px; }
        .bom { position: absolute; font-weight: bold; top: 0px; right: 0px; float: left; margin: 2px; padding: 2px 0px; line-height: 60px; width: 100px; height: 60px; text-align: center; color: rgb(255, 255, 255); font-size: 17px; border: 1px solid rgba(0, 0, 0, 0.16); border-radius: 10px; cursor: pointer; user-select: none; background-color: #000; }
        .tit { display: flex; justify-content: flex-start; }
        .title1 { width: 94.84%; height: 100px; color: white; display: flex; justify-content: space-between; margin: 0px auto; }
        .boms { display: flex; justify-content: flex-end; font-weight: bold; }
        .form-area { margin: 20px 0 20px 5px; width: 500px; background: white; padding: 15px; border-radius: 10px; }
        .form-area input, .form-area textarea { width: 90%; padding: 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
        .form-area button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="hd"><br></div>

<div class="title1">
    <div class="tit">
        <img src="class.webp" width="100">
        <img src="sbschool.webp" width="100" id="ddd">
    </div>
    <div class="boms">
        <div class="bom" id="b0">
            <text>返回首页</text>
        </div>
    </div>
</div>

<div class="ab">
    <h1>6(1)班 班级论坛</h1>
    <h2>本论坛提倡友好交流</h2>
    <h3>直接在下方留言即可，不用申请！加载要2秒左右，要看早的消息往下滑</h3>
</div>
<!-- 发表留言的表单 -->
<div class="form-area">
    <input type="text" id="昵称" placeholder="你的名字或学号" style="width: 90%;">
    <textarea id="内容" placeholder="说点什么..." rows="3" style="width: 90%;"></textarea>
    <button onclick="发留言()">发送留言</button>
</div>
<!-- 留言列表会显示在这里 -->
<div id="留言列表"></div>


<script>
// ⚠️ 改成你的 PythonAnywhere 地址
const API = 'https://liweizhimesly.pythonanywhere.com/api/messages';

async function 加载留言() {
    try {
        const res = await fetch(API);
        const 列表 = await res.json();
        const div = document.getElementById('留言列表');
        if (列表.length === 0) {
            div.innerHTML = '<div class="div"><div class="hhh">暂无留言，抢沙发！</div></div>';
            return;
        }
        div.innerHTML = 列表.map(m => {
            let date = new Date(m.created_at);
            let dateStr = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes()}`;
            return `<div class="div"><div class="hhh"><strong>${escapeHtml(m.name)}</strong>：${escapeHtml(m.content)}<br><span style="font-size:12px;color:gray;">${dateStr}</span></div></div>`;
        }).join('');
    } catch(e) {
        console.error('加载失败', e);
        document.getElementById('留言列表').innerHTML = '<div class="div"><div class="hhh">加载留言失败，请稍后再试</div></div>';
    }
}

async function 发留言() {
    const 昵称 = document.getElementById('昵称').value.trim();
    const 内容 = document.getElementById('内容').value.trim();
    if (!昵称 || !内容) {
        alert('请填写昵称和留言内容');
        return;
    }
    
    // 禁用按钮，防止重复提交
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '发送中...';
    
    try {
        const res = await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: 昵称, content: 内容})
        });
        const result = await res.json();
        if (result.error) {
            alert('发送失败：' + result.error);
        } else {
            alert('发送成功！');
            document.getElementById('昵称').value = '';
            document.getElementById('内容').value = '';
            await 加载留言(); // 等待刷新完成
        }
    } catch(e) {
        alert('网络错误，请稍后再试');
        console.error(e);
    } finally {
        // 恢复按钮
        btn.disabled = false;
        btn.textContent = '发送留言';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 页面加载时自动获取留言
setInterval(加载留言,1000);

// 返回首页按钮
document.getElementById('b0').onclick = function() {
    window.location.href = 'index.html';
};
</script>
</body>
</html>
