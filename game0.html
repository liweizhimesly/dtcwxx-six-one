<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>接住光球 · 反应力挑战</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
            padding: 16px;
        }

        .game-wrapper {
            background: rgba(10, 15, 25, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
        }

        .game-panel {
            background: #0f121f;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            cursor: none;
            background: #03050b;
            width: 100%;
            height: auto;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 20px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .score-card, .best-card {
            background: #05070f;
            border-radius: 60px;
            padding: 6px 24px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .score-label, .best-label {
            font-size: 0.8rem;
            color: #8e9aaf;
            letter-spacing: 1px;
        }

        .score-value, .best-value {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #FFF, #D4AF37);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        button {
            background: #1f253e;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 50px;
            color: #eef5ff;
            cursor: pointer;
            font-family: inherit;
            backdrop-filter: blur(4px);
            transition: transform 0.1s, background 0.2s;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.96);
            background: #2a2f50;
        }

        .btn-primary {
            background: #3b2e6b;
            box-shadow: 0 0 8px #6d5acf55;
        }

        .tip {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 18px;
            color: #6e7b9b;
        }

        @media (max-width: 600px) {
            .game-wrapper { padding: 12px; }
            .game-panel { padding: 12px; }
            .score-value, .best-value { font-size: 2rem; }
            button { padding: 8px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-panel">
        <div class="stats">
            <div class="score-card">
                <div class="score-label">🎯 得分</div>
                <div class="score-value" id="scoreDisplay">0</div>
            </div>
            <div class="best-card">
                <div class="best-label">🏆 最高分</div>
                <div class="best-value" id="bestDisplay">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="500" height="600" style="width:100%; height:auto; max-width:500px; aspect-ratio:500/600"></canvas>

        <div class="controls">
            <button class="btn-primary" id="resetBtn">🔄 重来</button>
        </div>
        <div class="tip">
            🖱️ 鼠标移动 / 🖐️ 手指滑动 / ◀ ▶ 方向键 &nbsp;&nbsp;|&nbsp;&nbsp;接住光球 +1分，漏掉结束
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- 画布元素 -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ----- 尺寸设置（逻辑分辨率固定500x600）-----
        const CANVAS_W = 500;
        const CANVAS_H = 600;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        
        // ----- 游戏参数 -----
        let score = 0;
        let bestScore = 0;
        let gameRunning = true;
        
        // 板子
        const PADDLE_W = 90;
        const PADDLE_H = 16;
        let paddleX = (CANVAS_W - PADDLE_W) / 2;
        
        // 小球
        let ball = {
            x: CANVAS_W/2,
            y: 40,
            radius: 12,
            vx: (Math.random() - 0.5) * 1.6,
            vy: 3.2
        };
        
        let baseSpeed = 3.2;
        let currentSpeed = baseSpeed;
        
        // 记录接住次数（每5个加速一次）
        let catchCount = 0;
        
        // 移动端 / 鼠标 控制标志
        let isDragging = false;
        
        // ----- 最高分读取 -----
        function loadBest() {
            try {
                const stored = localStorage.getItem('catchlight_best');
                if(stored && !isNaN(parseInt(stored))) {
                    bestScore = parseInt(stored);
                } else {
                    bestScore = 0;
                }
            } catch(e) { bestScore = 0; }
            document.getElementById('bestDisplay').innerText = bestScore;
        }
        
        function saveBest() {
            if(score > bestScore) {
                bestScore = score;
                document.getElementById('bestDisplay').innerText = bestScore;
                localStorage.setItem('catchlight_best', bestScore);
            }
        }
        
        // 更新UI分数
        function updateScoreUI() {
            document.getElementById('scoreDisplay').innerText = score;
        }
        
        // ----- 游戏重置 -----
        function resetGame() {
            gameRunning = true;
            score = 0;
            catchCount = 0;
            currentSpeed = baseSpeed;
            updateScoreUI();
            
            // 重置板子位置
            paddleX = (CANVAS_W - PADDLE_W) / 2;
            
            // 重置小球 (随机水平偏移，垂直靠上)
            ball.x = CANVAS_W/2 + (Math.random() - 0.5) * 80;
            ball.y = 40;
            ball.radius = 12;
            ball.vx = (Math.random() - 0.5) * 1.8;
            ball.vy = currentSpeed;
            
            // 边界限制 x 不超出画布
            if(ball.x - ball.radius < 0) ball.x = ball.radius;
            if(ball.x + ball.radius > CANVAS_W) ball.x = CANVAS_W - ball.radius;
        }
        
        // ----- 游戏结束逻辑 -----
        function endGame() {
            if(!gameRunning) return;
            gameRunning = false;
            saveBest();
        }
        
        // ----- 更新逻辑：移动球，碰撞，接球判定 -----
        function updateGame() {
            if(!gameRunning) return;
            
            // 移动球
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // 左右墙碰撞
            if(ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx = -ball.vx;
            }
            if(ball.x + ball.radius > CANVAS_W) {
                ball.x = CANVAS_W - ball.radius;
                ball.vx = -ball.vx;
            }
            
            // 顶部碰撞（弹一下，防止黏顶）
            if(ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy = -ball.vy;
            }
            
            // 检测是否碰到板子 (矩形 + 圆碰撞)
            const ballBottom = ball.y + ball.radius;
            const paddleTop = CANVAS_H - PADDLE_H;
            if(ballBottom >= paddleTop && ball.y - ball.radius <= paddleTop + PADDLE_H) {
                if(ball.x + ball.radius >= paddleX && ball.x - ball.radius <= paddleX + PADDLE_W) {
                    // 接住啦！
                    // 根据撞击偏移增加一点水平变化，更有趣
                    let hitPos = (ball.x - paddleX) / PADDLE_W;  // 0..1
                    let angle = (hitPos - 0.5) * 1.4;           // -0.7 ~ 0.7
                    ball.vx = angle * 3.2;
                    // 向上反弹，并略微增加速度基数（让游戏越来越快但可控）
                    ball.vy = -currentSpeed;
                    
                    // 得分
                    score++;
                    catchCount++;
                    updateScoreUI();
                    
                    // 每接住5次，游戏速度提升0.25（上限6.2）
                    if(catchCount >= 5) {
                        catchCount = 0;
                        currentSpeed = Math.min(currentSpeed + 0.28, 6.8);
                        // 调整当前小球竖直速度（保证下次反弹使用新速度）
                        ball.vy = -currentSpeed;
                    }
                    
                    // 简单防止黏连：把球放到板子上面一点
                    ball.y = paddleTop - ball.radius;
                    // 加分特效可以更新但不用额外标记
                    return;
                }
            }
            
            // 底部超出判定（游戏结束）
            if(ball.y + ball.radius >= CANVAS_H) {
                endGame();
            }
        }
        
        // ----- 绘制所有元素（光效+现代感）-----
        function draw() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            
            // 星空背景 (动态小星星)
            ctx.fillStyle = "#03050b";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            for(let i=0; i<150; i++) {
                if(i%2 === 0) continue; // 伪随机但好看
                ctx.fillStyle = `rgba(255,240,200,${0.2+Math.sin(Date.now()*0.001+i)*0.1})`;
                ctx.beginPath();
                ctx.arc( (i*131)%CANVAS_W, (i*253)%CANVAS_H, 1.2, 0, Math.PI*2);
                ctx.fill();
            }
            
            // ----- 光球（发光效果）-----
            ctx.shadowBlur = 18;
            ctx.shadowColor = "#ffdd88";
            const gradient = ctx.createRadialGradient(ball.x-3, ball.y-3, 3, ball.x, ball.y, ball.radius+2);
            gradient.addColorStop(0, '#fff7b0');
            gradient.addColorStop(0.7, '#f5b042');
            gradient.addColorStop(1, '#e07a1f');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
            ctx.fill();
            // 内高光
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(ball.x-2, ball.y-2, 4, 0, Math.PI*2);
            ctx.fillStyle = "#fffbc2";
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // ----- 板子 (半透明霓虹质感)-----
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(80, 100, 200, 0.85)";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#3a6ea5";
            ctx.fillRect(paddleX, CANVAS_H - PADDLE_H, PADDLE_W, PADDLE_H);
            // 板子边缘光效
            ctx.fillStyle = "#aaf0ff";
            ctx.fillRect(paddleX+4, CANVAS_H - PADDLE_H - 2, PADDLE_W-8, 3);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(paddleX+6, CANVAS_H - PADDLE_H - 1, PADDLE_W-12, 2);
            ctx.shadowBlur = 0;
            
            // 游戏结束蒙层
            if(!gameRunning) {
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                ctx.font = "bold 28px 'Segoe UI', system-ui";
                ctx.fillStyle = "#ffcf8a";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.fillText("⚡ GAME OVER ⚡", CANVAS_W/2, CANVAS_H/2 - 30);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#ddd";
                ctx.fillText("点击「重来」继续挑战", CANVAS_W/2, CANVAS_H/2 + 40);
                ctx.textAlign = "left";
            }
            
            // 当前速度提示(小字)
            ctx.font = "12px monospace";
            ctx.fillStyle = "#7e8aa8";
            ctx.fillText(`速度: ${currentSpeed.toFixed(1)}`, 12, 30);
        }
        
        // ----- 控制板子移动 (统一接口)-----
        function setPaddleX(clientX, rect) {
            let relativeX = clientX - rect.left;
            let newX = relativeX - PADDLE_W/2;
            newX = Math.min(Math.max(newX, 0), CANVAS_W - PADDLE_W);
            paddleX = newX;
        }
        
        // ----- 鼠标/触摸/键盘 事件绑定 -----
        function bindControls() {
            // 鼠标移动 (在canvas上移动)
            canvas.addEventListener('mousemove', (e) => {
                if(!gameRunning) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                let mouseX = (e.clientX - rect.left) * scaleX;
                mouseX = Math.min(Math.max(mouseX, 0), CANVAS_W);
                paddleX = mouseX - PADDLE_W/2;
                paddleX = Math.min(Math.max(paddleX, 0), CANVAS_W - PADDLE_W);
            });
            
            // 触摸滑动 (移动端)
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if(!gameRunning) return;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const scaleX = canvas.width / rect.width;
                let touchX = (touch.clientX - rect.left) * scaleX;
                touchX = Math.min(Math.max(touchX, 0), CANVAS_W);
                paddleX = touchX - PADDLE_W/2;
                paddleX = Math.min(Math.max(paddleX, 0), CANVAS_W - PADDLE_W);
            }, { passive: false });
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(!gameRunning) return;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const scaleX = canvas.width / rect.width;
                let touchX = (touch.clientX - rect.left) * scaleX;
                touchX = Math.min(Math.max(touchX, 0), CANVAS_W);
                paddleX = touchX - PADDLE_W/2;
                paddleX = Math.min(Math.max(paddleX, 0), CANVAS_W - PADDLE_W);
            });
            
            // 键盘控制 (左右方向键)
            window.addEventListener('keydown', (e) => {
                if(!gameRunning) return;
                if(e.key === 'ArrowLeft') {
                    paddleX -= 28;
                    paddleX = Math.max(paddleX, 0);
                    e.preventDefault();
                } else if(e.key === 'ArrowRight') {
                    paddleX += 28;
                    paddleX = Math.min(paddleX, CANVAS_W - PADDLE_W);
                    e.preventDefault();
                }
            });
        }
        
        // ----- 动画循环 -----
        let lastTimestamp = 0;
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ----- 重置按钮逻辑 -----
        const resetBtn = document.getElementById('resetBtn');
        resetBtn.addEventListener('click', () => {
            resetGame();
        });
        resetBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            resetGame();
        });
        
        // ----- 初始化 -----
        function init() {
            loadBest();
            bindControls();
            resetGame();   // 起始准备就绪
            gameLoop();
        }
        
        init();
    })();
</script>
</body>
</html>
