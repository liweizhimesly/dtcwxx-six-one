<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>私密频段 - 六年一班论坛</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0a0a0a; margin: 0; padding: 20px; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
        .container { max-width: 650px; margin: 0 auto; }
        .header { color: white; text-align: center; margin-bottom: 20px; padding: 10px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 20px; }
        .header h1 { margin: 0 0 5px 0; font-size: 1.8rem; }
        .current-channel-box { background: #1a1a2e; border-radius: 15px; padding: 10px 15px; margin-bottom: 20px; text-align: center; border: 1px solid #4CAF50; }
        .current-channel-label { color: #aaa; font-size: 0.85rem; }
        .current-channel-value { color: #4CAF50; font-size: 1.2rem; font-weight: bold; }
        .channel-selector { background: #111; padding: 15px; border-radius: 20px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; border: 1px solid #2a2a2a; max-height: 300px; overflow-y: auto; }
        .channel-btn { background: #1e1e2f; color: white; border: none; padding: 8px 12px; border-radius: 30px; cursor: pointer; font-size: 0.75rem; transition: all 0.2s; min-width: 80px; }
        .channel-btn.active { background: #4CAF50; }
        .channel-btn.locked { background: #2a2a2a; color: #888; opacity: 0.8; }
        .channel-btn.locked::after { content: " 🔒"; }
        .channel-btn.active::after { content: " 🔓"; }
        .message-area { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; max-height: 450px; overflow-y: auto; }
        .empty-messages { text-align: center; color: #999; padding: 40px 20px; }
        .message { padding: 12px; border-bottom: 1px solid #eee; }
        .message:last-child { border-bottom: none; }
        .message-name { font-weight: 600; color: #333; }
        .message-time { font-size: 11px; color: #aaa; margin-left: 10px; }
        .message-content { color: #555; line-height: 1.4; word-break: break-word; white-space: pre-wrap; }
        .form-area { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #4CAF50; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .send-btn { background: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #4CAF50; text-decoration: none; }
        .tip { text-align: center; color: #888; font-size: 0.7rem; margin-top: 15px; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-card { background: white; padding: 30px 25px; border-radius: 24px; text-align: center; width: 340px; }
        .modal-card h2 { margin: 0 0 10px 0; }
        .modal-card input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; margin: 10px 0; box-sizing: border-box; }
        .modal-card button { background: #4CAF50; color: white; border: none; padding: 12px 20px; border-radius: 30px; font-size: 1rem; cursor: pointer; width: 100%; }
        .error-msg { color: #f44336; margin-top: 12px; font-size: 0.85rem; }
        
        /* 加载遮罩 */
        .loading-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10001; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .loading-box { background: white; padding: 25px 35px; border-radius: 20px; text-align: center; }
        .loading-spinner { font-size: 40px; margin-bottom: 10px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-text { font-size: 16px; color: #333; }
        
        @media (max-width: 550px) { .channel-btn { padding: 6px 10px; min-width: 70px; font-size: 0.7rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔒 私密频段 0-63</h1>
        <p>第一个进入的人设置密码</p>
    </div>

    <div class="current-channel-box">
        <span class="current-channel-label">当前频段</span>
        <span id="当前频段显示" class="current-channel-value">⚡ 未选择</span>
    </div>

    <div class="channel-selector" id="频段按钮区"></div>

    <div id="留言区" style="display: none;">
        <div class="message-area" id="留言列表">
            <div class="empty-messages">💬 选择一个频段</div>
        </div>
        <div class="form-area">
            <div class="form-group">
                <label>👤 你的名字或学号</label>
                <input type="text" id="昵称" placeholder="例如：李伟志44号" maxlength="30">
            </div>
            <div class="form-group">
                <label>💬 留言内容</label>
                <textarea id="内容" placeholder="说点什么..." maxlength="500"></textarea>
            </div>
            <button class="send-btn" onclick="发留言()">📨 发送留言</button>
        </div>
    </div>

    <div class="back-link"><a href="chat.html">← 返回公开论坛</a></div>
    <div class="tip">💡 第一次进入频段需要设置密码，之后凭密码进入（刷新后需重新输入）</div>
</div>

<!-- 密码弹窗 -->
<div id="密码弹窗" class="modal" style="display: none;">
    <div class="modal-card">
        <h2 id="弹窗标题">🔐 频段 <span id="弹窗频段号"></span></h2>
        <p id="弹窗提示">请输入密码</p>
        <input type="password" id="密码输入" placeholder="密码" autocomplete="off">
        <button onclick="弹窗确认()">确认</button>
        <div id="弹窗错误" class="error-msg"></div>
    </div>
</div>

<!-- 加载遮罩 -->
<div id="加载遮罩" class="loading-mask">
    <div class="loading-box">
        <div class="loading-spinner">⏳</div>
        <div id="加载文字" class="loading-text">操作中...</div>
    </div>
</div>

<script>
const API_BASE = 'https://liweizhimesly.pythonanywhere.com';
let 当前频段 = null;
let 自动刷新定时器 = null;
let 弹窗模式 = null;
let 待处理频段 = null;

// 当前会话已解锁的频段（刷新页面就清空，不保存）
let 已解锁频段 = {};

// 频段总数（64个频道：0-63）
const 最大频段 = 63;

// ==================== 加载提示 ====================
function 显示加载(文字) {
    const 遮罩 = document.getElementById('加载遮罩');
    const 加载文字 = document.getElementById('加载文字');
    加载文字.innerText = 文字 || '操作中...';
    遮罩.style.display = 'flex';
}

function 隐藏加载() {
    const 遮罩 = document.getElementById('加载遮罩');
    遮罩.style.display = 'none';
}

// ==================== 清理无密码频段 ====================
async function 清理所有无密码频段() {
    for (let i = 0; i <= 最大频段; i++) {
        try {
            const res = await fetch(`${API_BASE}/api/channel/cleanup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ channel: i })
            });
            const result = await res.json();
            if (result.action === 'deleted') {
                console.log(`频段 ${i}: ${result.message}`);
            }
        } catch(e) {
            console.error(`清理频段 ${i} 失败`, e);
        }
    }
}

// ==================== 生成频段按钮 ====================
async function 生成频段按钮() {
    // 先清理无密码但有留言的频段
    显示加载('正在清理...');
    await 清理所有无密码频段();
    隐藏加载();
    
    const 容器 = document.getElementById('频段按钮区');
    if (!容器) return;
    容器.innerHTML = '';
    
    for (let i = 0; i <= 最大频段; i++) {
        const btn = document.createElement('button');
        
        if (已解锁频段[i]) {
            btn.className = 'channel-btn active';
            btn.textContent = `频段 ${i}`;
            btn.onclick = (function(chan) { return function() { 选择频段(chan); }; })(i);
        } else {
            btn.className = 'channel-btn locked';
            btn.textContent = `频段 ${i}`;
            btn.onclick = (function(chan) { return function() { 选择频段(chan); }; })(i);
            
            // 异步获取创建者信息
            (function(chan, button) {
                fetch(`${API_BASE}/api/channel/info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel: chan })
                })
                .then(res => res.json())
                .then(info => {
                    if (info.creator) {
                        button.innerHTML = `频段 ${chan} (${info.creator})`;
                    }
                })
                .catch(e => console.error(e));
            })(i, btn);
        }
        容器.appendChild(btn);
    }
}

// ==================== 选择频段 ====================
async function 选择频段(频段号) {
    if (已解锁频段[频段号]) {
        进入频段(频段号);
        return;
    }
    
    显示加载('正在检查频段...');
    
    try {
        const infoRes = await fetch(`${API_BASE}/api/channel/info`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channel: 频段号 })
        });
        const info = await infoRes.json();
        
        const checkRes = await fetch(`${API_BASE}/api/channel/check`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channel: 频段号 })
        });
        const checkResult = await checkRes.json();
        
        待处理频段 = 频段号;
        
        if (checkResult.has_password) {
            弹窗模式 = 'verify';
            document.getElementById('弹窗标题').innerHTML = `🔐 频段 ${频段号}`;
            if (info.creator) {
                document.getElementById('弹窗提示').innerHTML = `创建者：${info.creator}<br>请输入密码`;
            } else {
                document.getElementById('弹窗提示').innerHTML = '请输入密码';
            }
        } else {
            弹窗模式 = 'setup';
            document.getElementById('弹窗标题').innerHTML = `🎉 频段 ${频段号} 首次开启`;
            document.getElementById('弹窗提示').innerHTML = '请设置密码（至少4位）';
        }
        document.getElementById('密码输入').value = '';
        document.getElementById('弹窗错误').innerText = '';
        document.getElementById('密码弹窗').style.display = 'flex';
    } catch(e) {
        alert('操作失败，请稍后再试');
        console.error(e);
    } finally {
        隐藏加载();
    }
}

// ==================== 弹窗确认 ====================
async function 弹窗确认() {
    const 密码 = document.getElementById('密码输入').value.trim();
    if (!密码) {
        document.getElementById('弹窗错误').innerText = '请输入密码';
        return;
    }
    if (弹窗模式 === 'setup' && 密码.length < 4) {
        document.getElementById('弹窗错误').innerText = '密码至少4位';
        return;
    }
    
    显示加载(弹窗模式 === 'setup' ? '正在设置密码...' : '正在验证密码...');
    
    try {
        if (弹窗模式 === 'setup') {
            const 昵称 = prompt('请输入你的名字（作为频段创建者）', '创建者') || '创建者';
            const res = await fetch(`${API_BASE}/api/channel/setup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ channel: 待处理频段, password: 密码, creator: 昵称 })
            });
            const result = await res.json();
            if (result.success) {
                已解锁频段[待处理频段] = true;
                document.getElementById('密码弹窗').style.display = 'none';
                生成频段按钮();
                进入频段(待处理频段);
            } else {
                document.getElementById('弹窗错误').innerText = result.error || '设置失败';
            }
        } else {
            const res = await fetch(`${API_BASE}/api/channel/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ channel: 待处理频段, password: 密码 })
            });
            if (res.status === 401 || res.status === 404) {
                document.getElementById('弹窗错误').innerText = '密码错误！';
                return;
            }
            const result = await res.json();
            if (result.success) {
                已解锁频段[待处理频段] = true;
                document.getElementById('密码弹窗').style.display = 'none';
                生成频段按钮();
                进入频段(待处理频段);
            } else {
                document.getElementById('弹窗错误').innerText = result.error || '密码错误';
            }
        }
    } catch(e) {
        document.getElementById('弹窗错误').innerText = '操作失败，请稍后再试';
        console.error(e);
    } finally {
        隐藏加载();
    }
}

// 点击背景关闭弹窗
document.getElementById('密码弹窗')?.addEventListener('click', function(e) {
    if (e.target === this) this.style.display = 'none';
});

// ==================== 加载留言 ====================
async function 加载留言(显示提示 = false) {
    if (当前频段 === null) return;
    
    if (显示提示) {
        显示加载('正在加载留言...');
    }
    
    try {
        const res = await fetch(`${API_BASE}/api/channel/messages`, {
            headers: { 'X-Channel': 当前频段 }
        });
        const 列表 = await res.json();
        const div = document.getElementById('留言列表');
        if (!列表 || 列表.length === 0) {
            div.innerHTML = '<div class="empty-messages">✨ 暂无留言，来抢沙发吧 ✨</div>';
            return;
        }
        div.innerHTML = 列表.map(m => {
            let date = new Date(m.created_at);
            let dateStr = `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
            return `<div class="message"><div><span class="message-name">${escapeHtml(m.name)}</span><span class="message-time">${dateStr}</span></div><div class="message-content">${escapeHtml(m.content)}</div></div>`;
        }).join('');
        div.scrollTop = div.scrollHeight;
    } catch(e) { 
        console.error(e);
    } finally {
        if (显示提示) {
            隐藏加载();
        }
    }
}

// ==================== 进入频段 ====================
async function 进入频段(频段号) {
    当前频段 = 频段号;
    
    try {
        const res = await fetch(`${API_BASE}/api/channel/info`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channel: 频段号 })
        });
        const info = await res.json();
        if (info.creator) {
            document.getElementById('当前频段显示').innerHTML = `频段 ${频段号} 🔓 (创建者: ${info.creator})`;
        } else {
            document.getElementById('当前频段显示').innerHTML = `频段 ${频段号} 🔓`;
        }
    } catch(e) {
        document.getElementById('当前频段显示').innerHTML = `频段 ${频段号} 🔓`;
    }
    
    document.getElementById('留言区').style.display = 'block';
    document.getElementById('昵称').value = '';
    document.getElementById('内容').value = '';
    
    // 首次加载时显示提示
    加载留言(true);
    
    // 设置自动刷新（不显示提示）
    if (自动刷新定时器) clearInterval(自动刷新定时器);
    自动刷新定时器 = setInterval(() => { 
        if (当前频段 !== null) 加载留言(false); 
    }, 3000);
}

// ==================== 发送留言 ====================
async function 发留言() {
    if (当前频段 === null) { alert('请先选择一个频段'); return; }
    const 昵称 = document.getElementById('昵称').value.trim();
    const 内容 = document.getElementById('内容').value.trim();
    if (!昵称) { alert('请填写名字或学号'); return; }
    if (!内容) { alert('请填写留言内容'); return; }
    
    显示加载('正在发送留言...');
    
    try {
        const res = await fetch(`${API_BASE}/api/channel/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: 昵称, content: 内容, channel: 当前频段 })
        });
        const result = await res.json();
        if (result.error) {
            alert('发送失败：' + result.error);
        } else {
            document.getElementById('昵称').value = '';
            document.getElementById('内容').value = '';
            // 发送后刷新不显示提示
            await 加载留言(false);
        }
    } catch(e) { 
        alert('网络错误');
    } finally {
        隐藏加载();
    }
}

function escapeHtml(text) { 
    if (!text) return '';
    const div = document.createElement('div'); 
    div.textContent = text; 
    return div.innerHTML; 
}

// 初始化
生成频段按钮();
</script>
</body>
</html>
